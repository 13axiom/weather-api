name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Unit Tests — always runs
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -v -count=1 -short

      - name: Build binary
        run: go build -o /tmp/weather-api ./cmd/server/...

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: API Integration Tests + Allure Report
  #
  # Enabled by default on PRs to main.
  # To disable: add repository variable ENABLE_API_TESTS = false
  # ────────────────────────────────────────────────────────────────────────────
  api-integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ vars.ENABLE_API_TESTS != 'false' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weather_user
          POSTGRES_PASSWORD: weather_pass
          POSTGRES_DB: weather_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL:        postgres://weather_user:weather_pass@localhost:5432/weather_db
      PORT:                "8080"
      SYNC_INTERVAL_HOURS: "9999"
      INTERNAL_API_KEY:    ${{ secrets.INTERNAL_API_KEY }}
      OWM_API_KEY:         ${{ secrets.OWM_API_KEY }}
      ALLOWED_ORIGINS:     http://localhost:3000

    steps:
      # ── 1. Checkout weather-api ─────────────────────────────────────────────
      - name: Checkout weather-api
        uses: actions/checkout@v4

      # ── 2. Checkout api-running-portal-tests ────────────────────────────────
      - name: Checkout api-running-portal-tests
        uses: actions/checkout@v4
        with:
          repository: 13axiom/api-running-portal-tests
          path: _api-running-portal-tests
          # token: ${{ secrets.GH_PAT }}  # uncomment if repo is private

      # ── 3. Set up Go (to start weather-api) ────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      # ── 4. Start weather-api ────────────────────────────────────────────────
      - name: Start weather-api
        run: |
          go mod download
          go run ./cmd/server/... &
          echo "Waiting for /health..."
          timeout 30 bash -c 'until curl -sf http://localhost:8080/health; do sleep 1; done'
          echo "✅ weather-api is up"

      # ── 5. Set up Java 21 + Gradle ──────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      # ── 6. Run weather + auth test suites ──────────────────────────────────
      - name: Run integration tests (weather + auth suites)
        working-directory: _api-running-portal-tests
        env:
          WEATHER_API_URL:  http://localhost:8080
          RACES_API_URL:    http://localhost:8081   # not started — races tests skip
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: >
          gradle test --no-daemon
          -Dallure.results.directory=${{ github.workspace }}/allure-results
          -Dsuite=weather
        continue-on-error: true

      # ── 7. Generate Allure HTML report ──────────────────────────────────────
      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.8
        if: always()
        with:
          allure_results: allure-results
          allure_report:  allure-report

      # ── 8. Upload report artifact ────────────────────────────────────────────
      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-weather-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      # ── 9. Job summary ───────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 🧪 API Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the **Allure Report** from the Artifacts section above." >> $GITHUB_STEP_SUMMARY

      # ── 10. Fail if tests failed ─────────────────────────────────────────────
      - name: Check test result
        if: always()
        working-directory: _api-running-portal-tests
        run: |
          if find build/reports/tests/test -name "*.xml" -exec grep -l 'failures="[^0]"' {} \; 2>/dev/null | grep -q .; then
            echo "❌ Some tests failed — see Allure report artifact"
            exit 1
          fi
          echo "✅ All tests passed"
